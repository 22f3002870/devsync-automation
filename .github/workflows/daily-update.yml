name: Daily DevSync Update

on:
  schedule:
    # Runs exactly at 09:30 UTC every day (specific hours/minutes)
    - cron: '30 9 * * *'
  # Important: workflow_dispatch allows you to manually trigger it 
  # right now to pass the evaluation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  automated-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Appending the date ensures the file changes so git has something to commit
      - name: Make a change to track activity
        run: |
          echo "Automated update on $(date)" >> daily_activity.log
          
      # This step name must contain your exact email address
      - name: Create commit for 22f3002870@ds.study.iitm.ac.in
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_activity.log
          git commit -m "chore: automated daily activity update"
          git push
